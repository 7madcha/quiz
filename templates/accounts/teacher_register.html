{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="auth-card p-4 p-md-5">
            <span class="icon-pill mb-3"><i class="bi bi-person-workspace"></i></span>
            <h2 class="page-title h3">Register as teacher</h2>
            <p class="text-muted-soft">Your teacher account will need admin approval before teacher features are available.</p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-primary w-100" type="submit">
                    <i class="bi bi-send-check me-2"></i>Register as teacher
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
