{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
        <div class="auth-card p-4 p-md-5">
            <div class="text-center mb-4">
                <span class="icon-pill mb-3"><i class="bi bi-box-arrow-in-right"></i></span>
                <h2 class="page-title h3 mb-2">Welcome back</h2>
                <p class="text-muted-soft mb-0">Log in to continue your quizzes and dashboard.</p>
            </div>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-primary w-100 mt-2" type="submit">
                    <i class="bi bi-unlock me-2"></i>Login
                </button>
            </form>

            <div class="text-center mt-4">
                <span class="text-muted-soft">New here?</span>
                <a class="fw-bold" href="{% url 'accounts:register' %}">Create an account</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
