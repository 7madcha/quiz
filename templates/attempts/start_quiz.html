{% extends 'base.html' %}

{% block content %}
<h2>{{ quiz.title }}</h2>

<form method="post">
    {% csrf_token %}

    {% for question in quiz.questions.all %}
        <div>
            <h3>{{ question.text }}</h3>

            {% for choice in question.choices.all %}
                <label>
                    <input type="radio" name="question_{{ question.id }}" value="{{ choice.id }}">
                    {{ choice.text }}
                </label>
                <br>
            {% endfor %}
        </div>
        <hr>
    {% endfor %}

    <button type="submit">Submit quiz</button>
</form>
{% endblock %}
