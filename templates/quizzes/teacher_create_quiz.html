{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="content-card p-4 p-md-5">
            <div class="d-flex align-items-start justify-content-between gap-3 mb-4">
                <div>
                    <span class="eyebrow">Teacher workspace</span>
                    <h2 class="page-title mt-2 mb-1">Create Quiz</h2>
                    <p class="text-muted-soft mb-0">Set the quiz details before adding questions and choices.</p>
                </div>
                <span class="icon-pill"><i class="bi bi-plus-square"></i></span>
            </div>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex flex-wrap gap-2 mt-4">
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-check2-circle me-2"></i>Create quiz
                    </button>
                    <a class="btn btn-outline-primary" href="{% url 'quizzes:teacher_quiz_list' %}">
                        <i class="bi bi-arrow-left me-2"></i>Back to my quizzes
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
