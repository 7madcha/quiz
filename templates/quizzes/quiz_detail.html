{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="content-card p-4 p-md-5">
            <div class="d-flex flex-column flex-md-row align-items-md-start justify-content-between gap-3">
                <div>
                    <span class="eyebrow">Quiz overview</span>
                    <h2 class="page-title mt-2 mb-3">{{ quiz.title }}</h2>
                    <p class="text-muted-soft mb-0">Review the quiz details before starting.</p>
                </div>
                <span class="icon-pill"><i class="bi bi-journal-check"></i></span>
            </div>

            <div class="row g-3 my-4">
                <div class="col-sm-4">
                    <div class="stat-card shadow-none">
                        <div class="text-muted-soft small fw-bold text-uppercase">Subject</div>
                        <div class="fw-bold">{{ quiz.subject }}</div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="stat-card shadow-none">
                        <div class="text-muted-soft small fw-bold text-uppercase">Difficulty</div>
                        <div class="fw-bold">{{ quiz.get_difficulty_display }}</div>
                    </div>
                </div>
                <div class="col-sm-4">
                    <div class="stat-card shadow-none">
                        <div class="text-muted-soft small fw-bold text-uppercase">Questions</div>
                        <div class="fw-bold">{{ quiz.questions.all|length }}</div>
                    </div>
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2">
                <a class="btn btn-primary" href="{% url 'attempts:start_quiz' quiz.id %}">
                    <i class="bi bi-play-circle me-2"></i>Start quiz
                </a>
                <a class="btn btn-outline-primary" href="{% url 'quizzes:quiz_list' %}">
                    <i class="bi bi-arrow-left me-2"></i>Back to quizzes
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
