{% extends 'base.html' %}

{% block content %}
<h2>My Quizzes</h2>

<p>
    <a href="{% url 'quizzes:teacher_create_quiz' %}">Create quiz</a>
</p>

{% for quiz in quizzes %}
    <p>
        {{ quiz.title }} - {{ quiz.status }} - {{ quiz.domain }}
        <a href="{% url 'quizzes:teacher_manage_quiz' quiz.id %}">Manage</a>
    </p>
{% empty %}
    <p>No quizzes created yet.</p>
{% endfor %}
{% endblock %}
